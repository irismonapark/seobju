name: Deploy ResumeConverter to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'ResumeConverter/**'
      - '.github/workflows/deploy-resume.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ResumeConverter
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_RESUME }}
